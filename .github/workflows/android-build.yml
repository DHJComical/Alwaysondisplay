name: Android Build

on:
  push:
    branches:
      - '**'
    tags:
      - '*'
    paths-ignore:
      - '**/*.md'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release
      publish_release:
        description: Publish to GitHub Releases (release only)
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: read

jobs:
  draft-release:
    if: github.event_name == 'push' && github.ref_type != 'tag' && (github.ref_name == 'master' || github.ref_name == 'main')
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter.yml

  build-apk:
    runs-on: ubuntu-latest
    env:
      APP_NAME: AlwaysOnDisplay
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Resolve build config
        id: config
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            BUILD_TYPE="release"
            PUBLISH_RELEASE="true"
            RELEASE_TAG="${{ github.ref_name }}"
            CURRENT_REF="${{ github.ref_name }}"
            PREVIOUS_TAG_SOURCE="${{ github.ref_name }}^"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BUILD_TYPE="${{ inputs.build_type }}"
            if [[ "${{ inputs.publish_release }}" == "true" ]]; then
              PUBLISH_RELEASE="true"
            else
              PUBLISH_RELEASE="false"
            fi
            RELEASE_TAG="release-${{ github.run_number }}"
            CURRENT_REF="${{ github.sha }}"
            PREVIOUS_TAG_SOURCE="${{ github.sha }}"
          else
            BUILD_TYPE="debug"
            PUBLISH_RELEASE="false"
            RELEASE_TAG=""
            CURRENT_REF="${{ github.sha }}"
            PREVIOUS_TAG_SOURCE="${{ github.sha }}"
          fi

          if [[ -n "${RELEASE_TAG}" ]]; then
            SAFE_RELEASE_TAG="${RELEASE_TAG//\//-}"
            SAFE_RELEASE_TAG="${SAFE_RELEASE_TAG// /-}"
            ARTIFACT_BASENAME="${APP_NAME}-${SAFE_RELEASE_TAG}"
          else
            ARTIFACT_BASENAME="${APP_NAME}-${{ github.run_number }}"
          fi

          echo "build_type=${BUILD_TYPE}" >> "$GITHUB_OUTPUT"
          echo "publish_release=${PUBLISH_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "current_ref=${CURRENT_REF}" >> "$GITHUB_OUTPUT"
          echo "previous_tag_source=${PREVIOUS_TAG_SOURCE}" >> "$GITHUB_OUTPUT"
          echo "gradle_task=assemble${BUILD_TYPE^}" >> "$GITHUB_OUTPUT"
          echo "apk_dir=app/build/outputs/apk/${BUILD_TYPE}" >> "$GITHUB_OUTPUT"
          echo "artifact_basename=${ARTIFACT_BASENAME}" >> "$GITHUB_OUTPUT"
          echo "artifact_file=${ARTIFACT_BASENAME}.apk" >> "$GITHUB_OUTPUT"

      - name: Resolve version metadata
        id: version
        shell: bash
        run: |
          CURRENT_VERSION_CODE="$(sed -nE 's/.*defaultVersionCode = ([0-9]+).*/\1/p' app/build.gradle | head -n 1)"
          TAG_COUNT="$(git tag --list | wc -l | tr -d ' ')"

          if [[ -z "${CURRENT_VERSION_CODE}" ]]; then
            echo "Failed to resolve current versionCode" >&2
            exit 1
          fi

          LATEST_VERSION_CODE="$((CURRENT_VERSION_CODE + TAG_COUNT))"

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            CI_VERSION_NAME="${{ github.ref_name }}"
            CI_VERSION_CODE="$((LATEST_VERSION_CODE + 1))"
          else
            CI_VERSION_NAME="actions-${{ github.run_number }}"
            CI_VERSION_CODE="${LATEST_VERSION_CODE}"
          fi

          echo "version_code=${CI_VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "version_name=${CI_VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew ${{ steps.config.outputs.gradle_task }} -PciVersionCode=${{ steps.version.outputs.version_code }} -PciVersionName=${{ steps.version.outputs.version_name }}

      - name: Sign release APK
        id: sign_release
        if: steps.config.outputs.build_type == 'release' && env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_PASSWORD != ''
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: ${{ steps.config.outputs.apk_dir }}
          signingKeyBase64: ${{ env.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ env.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ env.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ env.ANDROID_KEY_PASSWORD }}

      - name: Prepare artifact
        id: artifact
        shell: bash
        run: |
          mkdir -p dist

          if [[ "${{ steps.config.outputs.build_type }}" == "release" && -n "${{ steps.sign_release.outputs.signedReleaseFile }}" ]]; then
            SOURCE_APK="${{ steps.sign_release.outputs.signedReleaseFile }}"
          else
            SOURCE_APK="$(find "${{ steps.config.outputs.apk_dir }}" -maxdepth 1 -type f -name "*.apk" | head -n 1)"
          fi

          if [[ -z "${SOURCE_APK}" ]]; then
            echo "APK not found" >&2
            exit 1
          fi

          TARGET_APK="dist/${{ steps.config.outputs.artifact_file }}"
          cp "${SOURCE_APK}" "${TARGET_APK}"
          echo "apk_path=${TARGET_APK}" >> "$GITHUB_OUTPUT"

      - name: Generate release body with Release Drafter
        id: release_drafter
        if: steps.config.outputs.publish_release == 'true' && steps.config.outputs.build_type == 'release'
        uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter.yml
          dry-run: true
          tag: ${{ steps.config.outputs.release_tag }}
          version: ${{ steps.version.outputs.version_name }}
          name: ${{ env.APP_NAME }} ${{ steps.config.outputs.release_tag }}
          footer: |
            ## Build Info

            - Tag: `${{ steps.config.outputs.release_tag }}`
            - Workflow Run: `${{ github.run_number }}`
            - Version Name: `${{ steps.version.outputs.version_name }}`
            - Version Code: `${{ steps.version.outputs.version_code }}`
            - APK: `${{ steps.config.outputs.artifact_file }}`

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.config.outputs.artifact_basename }}
          path: ${{ steps.artifact.outputs.apk_path }}
          if-no-files-found: error

      - name: Create or update GitHub release and asset
        if: steps.config.outputs.publish_release == 'true' && steps.config.outputs.build_type == 'release'
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.config.outputs.release_tag }}
          RELEASE_NAME: ${{ env.APP_NAME }} ${{ steps.config.outputs.release_tag }}
          RELEASE_TARGET: ${{ github.sha }}
          RELEASE_BODY: ${{ steps.release_drafter.outputs.body }}
          RELEASE_ASSET_PATH: ${{ steps.artifact.outputs.apk_path }}
          RELEASE_ASSET_NAME: ${{ steps.config.outputs.artifact_file }}
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseTag = process.env.RELEASE_TAG;
            const releaseName = process.env.RELEASE_NAME;
            const releaseTarget = process.env.RELEASE_TARGET;
            const body = process.env.RELEASE_BODY || '';
            const assetPath = process.env.RELEASE_ASSET_PATH;
            const assetName = process.env.RELEASE_ASSET_NAME;
            const assetData = fs.readFileSync(assetPath);
            let release;

            try {
              release = (
                await github.rest.repos.getReleaseByTag({
                  owner,
                  repo,
                  tag: releaseTag,
                })
              ).data;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              release = (
                await github.rest.repos.createRelease({
                  owner,
                  repo,
                  tag_name: releaseTag,
                  target_commitish: releaseTarget,
                  name: releaseName,
                  body,
                  draft: false,
                  prerelease: false,
                  make_latest: 'true',
                })
              ).data;
            }

            release = (
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                tag_name: releaseTag,
                target_commitish: releaseTarget,
                name: releaseName,
                body,
                draft: false,
                prerelease: false,
                make_latest: 'true',
              })
            ).data;

            const existingAsset = (release.assets || []).find((asset) => asset.name === assetName);
            if (existingAsset) {
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: existingAsset.id,
              });
            }

            await github.rest.repos.uploadReleaseAsset({
              owner,
              repo,
              release_id: release.id,
              name: assetName,
              headers: {
                'content-type': 'application/vnd.android.package-archive',
                'content-length': assetData.length,
              },
              data: assetData,
            });
