name: Android Build

on:
  push:
    branches:
      - '**'
    tags:
      - '*'
    paths-ignore:
      - '**/*.md'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release
      publish_release:
        description: Publish to GitHub Releases (release only)
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: read

jobs:
  draft-release:
    if: github.event_name == 'push' && github.ref_type != 'tag' && (github.ref_name == 'master' || github.ref_name == 'main')
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter.yml

  build-apk:
    runs-on: ubuntu-latest
    env:
      APP_NAME: AlwaysOnDisplay
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Resolve build config
        id: config
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            BUILD_TYPE="release"
            PUBLISH_RELEASE="true"
            RELEASE_TAG="${{ github.ref_name }}"
            CURRENT_REF="${{ github.ref_name }}"
            PREVIOUS_TAG_SOURCE="${{ github.ref_name }}^"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BUILD_TYPE="${{ inputs.build_type }}"
            if [[ "${{ inputs.publish_release }}" == "true" ]]; then
              PUBLISH_RELEASE="true"
            else
              PUBLISH_RELEASE="false"
            fi
            RELEASE_TAG="release-${{ github.run_number }}"
            CURRENT_REF="${{ github.sha }}"
            PREVIOUS_TAG_SOURCE="${{ github.sha }}"
          else
            BUILD_TYPE="debug"
            PUBLISH_RELEASE="false"
            RELEASE_TAG=""
            CURRENT_REF="${{ github.sha }}"
            PREVIOUS_TAG_SOURCE="${{ github.sha }}"
          fi

          if [[ -n "${RELEASE_TAG}" ]]; then
            SAFE_RELEASE_TAG="${RELEASE_TAG//\//-}"
            SAFE_RELEASE_TAG="${SAFE_RELEASE_TAG// /-}"
            ARTIFACT_BASENAME="${APP_NAME}-${SAFE_RELEASE_TAG}"
          else
            ARTIFACT_BASENAME="${APP_NAME}-${{ github.run_number }}"
          fi

          echo "build_type=${BUILD_TYPE}" >> "$GITHUB_OUTPUT"
          echo "publish_release=${PUBLISH_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "current_ref=${CURRENT_REF}" >> "$GITHUB_OUTPUT"
          echo "previous_tag_source=${PREVIOUS_TAG_SOURCE}" >> "$GITHUB_OUTPUT"
          echo "gradle_task=assemble${BUILD_TYPE^}" >> "$GITHUB_OUTPUT"
          echo "apk_dir=app/build/outputs/apk/${BUILD_TYPE}" >> "$GITHUB_OUTPUT"
          echo "artifact_basename=${ARTIFACT_BASENAME}" >> "$GITHUB_OUTPUT"
          echo "artifact_file=${ARTIFACT_BASENAME}.apk" >> "$GITHUB_OUTPUT"

      - name: Resolve version metadata
        id: version
        shell: bash
        run: |
          CURRENT_VERSION_CODE="$(sed -nE 's/.*defaultVersionCode = ([0-9]+).*/\1/p' app/build.gradle | head -n 1)"
          TAG_COUNT="$(git tag --list | wc -l | tr -d ' ')"

          if [[ -z "${CURRENT_VERSION_CODE}" ]]; then
            echo "Failed to resolve current versionCode" >&2
            exit 1
          fi

          LATEST_VERSION_CODE="$((CURRENT_VERSION_CODE + TAG_COUNT))"

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            CI_VERSION_NAME="${{ github.ref_name }}"
            CI_VERSION_CODE="$((LATEST_VERSION_CODE + 1))"
          else
            CI_VERSION_NAME="actions-${{ github.run_number }}"
            CI_VERSION_CODE="${LATEST_VERSION_CODE}"
          fi

          echo "version_code=${CI_VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "version_name=${CI_VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew ${{ steps.config.outputs.gradle_task }} -PciVersionCode=${{ steps.version.outputs.version_code }} -PciVersionName=${{ steps.version.outputs.version_name }}

      - name: Sign release APK
        id: sign_release
        if: steps.config.outputs.build_type == 'release' && env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_PASSWORD != ''
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: ${{ steps.config.outputs.apk_dir }}
          signingKeyBase64: ${{ env.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ env.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ env.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ env.ANDROID_KEY_PASSWORD }}

      - name: Prepare artifact
        id: artifact
        shell: bash
        run: |
          mkdir -p dist

          if [[ "${{ steps.config.outputs.build_type }}" == "release" && -n "${{ steps.sign_release.outputs.signedReleaseFile }}" ]]; then
            SOURCE_APK="${{ steps.sign_release.outputs.signedReleaseFile }}"
          else
            SOURCE_APK="$(find "${{ steps.config.outputs.apk_dir }}" -maxdepth 1 -type f -name "*.apk" | head -n 1)"
          fi

          if [[ -z "${SOURCE_APK}" ]]; then
            echo "APK not found" >&2
            exit 1
          fi

          TARGET_APK="dist/${{ steps.config.outputs.artifact_file }}"
          cp "${SOURCE_APK}" "${TARGET_APK}"
          echo "apk_path=${TARGET_APK}" >> "$GITHUB_OUTPUT"

      - name: Draft or publish release with Release Drafter
        id: release_drafter
        if: steps.config.outputs.publish_release == 'true' && steps.config.outputs.build_type == 'release'
        uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter.yml
          publish: true
          tag: ${{ steps.config.outputs.release_tag }}
          version: ${{ steps.version.outputs.version_name }}
          name: ${{ env.APP_NAME }} ${{ steps.config.outputs.release_tag }}
          commitish: ${{ github.sha }}

      - name: Prepare release notes
        id: release_notes
        if: steps.config.outputs.publish_release == 'true'
        shell: bash
        run: |
          NOTES_FILE="dist/release-notes.md"
          CURRENT_REF="${{ steps.config.outputs.current_ref }}"
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${{ steps.config.outputs.previous_tag_source }}" 2>/dev/null || true)"

          cat <<'__RELEASE_DRAFTER_BODY__' > "${NOTES_FILE}"
${{ steps.release_drafter.outputs.body }}
__RELEASE_DRAFTER_BODY__

          if [[ -n "${PREVIOUS_TAG}" ]]; then
            CHANGELOG_RANGE="${PREVIOUS_TAG}..${CURRENT_REF}"
          else
            CHANGELOG_RANGE="${CURRENT_REF}"
          fi

          {
            echo ""
            echo "## Build Info"
            echo ""
            echo "- Tag: \`${{ steps.config.outputs.release_tag }}\`"
            echo "- Workflow Run: \`${{ github.run_number }}\`"
            echo "- Version Name: \`${{ steps.version.outputs.version_name }}\`"
            echo "- Version Code: \`${{ steps.version.outputs.version_code }}\`"
            echo "- APK: \`${{ steps.config.outputs.artifact_file }}\`"
            echo ""
            echo "## Direct Commits"
            if [[ -n "${PREVIOUS_TAG}" ]]; then
              echo ""
              echo "From \`${PREVIOUS_TAG}\` to \`${{ steps.config.outputs.release_tag }}\`"
            fi
            echo ""
            git log "${CHANGELOG_RANGE}" --pretty=format:"- %s (%h)"
          } >> "${NOTES_FILE}"

          echo "notes_path=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Collect release contributors
        id: contributors
        if: steps.config.outputs.publish_release == 'true'
        uses: actions/github-script@v7
        env:
          CURRENT_REF: ${{ steps.config.outputs.current_ref }}
          PREVIOUS_TAG_SOURCE: ${{ steps.config.outputs.previous_tag_source }}
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            const currentRef = process.env.CURRENT_REF;
            const previousTagSource = process.env.PREVIOUS_TAG_SOURCE;
            let previousTag = '';

            try {
              previousTag = execSync(`git describe --tags --abbrev=0 ${previousTagSource}`, { encoding: 'utf8' }).trim();
            } catch (error) {
              previousTag = '';
            }

            const range = previousTag ? `${previousTag}..${currentRef}` : currentRef;
            const shas = execSync(`git rev-list ${range}`, { encoding: 'utf8' })
              .split('\n')
              .map((line) => line.trim())
              .filter(Boolean);

            const seen = new Map();
            for (const sha of shas) {
              const commit = (
                await github.rest.repos.getCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: sha,
                })
              ).data;

              const author = commit.author;
              if (!author || seen.has(author.login)) {
                continue;
              }

              const avatarUrl = `${author.avatar_url}${author.avatar_url.includes('?') ? '&' : '?'}s=40`;
              seen.set(
                author.login,
                `<img src="${avatarUrl}" width="20" height="20" alt="@${author.login}" /> [@${author.login}](${author.html_url})`
              );
            }

            const contributorFile = 'dist/contributors.md';
            fs.mkdirSync('dist', { recursive: true });
            fs.writeFileSync(
              contributorFile,
              seen.size > 0
                ? Array.from(seen.values()).join(', ')
                : 'No contributors\n',
              'utf8'
            );
            core.setOutput('contributors_path', contributorFile);

      - name: Append contributors to release notes
        if: steps.config.outputs.publish_release == 'true'
        shell: bash
        run: |
          {
            echo ""
            echo "## Contributors"
            echo ""
            cat "${{ steps.contributors.outputs.contributors_path }}"
          } >> "${{ steps.release_notes.outputs.notes_path }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.config.outputs.artifact_basename }}
          path: ${{ steps.artifact.outputs.apk_path }}
          if-no-files-found: error

      - name: Update published release body and asset
        if: steps.config.outputs.publish_release == 'true' && steps.config.outputs.build_type == 'release'
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ steps.release_drafter.outputs.id }}
          RELEASE_BODY_PATH: ${{ steps.release_notes.outputs.notes_path }}
          RELEASE_ASSET_PATH: ${{ steps.artifact.outputs.apk_path }}
          RELEASE_ASSET_NAME: ${{ steps.config.outputs.artifact_file }}
        with:
          script: |
            const fs = require('fs');

            const releaseId = Number(process.env.RELEASE_ID);
            const body = fs.readFileSync(process.env.RELEASE_BODY_PATH, 'utf8');
            const assetPath = process.env.RELEASE_ASSET_PATH;
            const assetName = process.env.RELEASE_ASSET_NAME;
            const assetData = fs.readFileSync(assetPath);

            const release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });

            const existingAsset = (release.data.assets || []).find((asset) => asset.name === assetName);
            if (existingAsset) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existingAsset.id,
              });
            }

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              body,
            });

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: assetName,
              headers: {
                'content-type': 'application/vnd.android.package-archive',
                'content-length': assetData.length,
              },
              data: assetData,
            });
